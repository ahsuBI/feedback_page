<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: #FDF8F4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
  }

  /* Subtle background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(212, 175, 138, 0.06) 40px,
        rgba(212, 175, 138, 0.06) 41px
      );
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: #FFFFFF;
    border: 0.5px solid #E8C9B5;
    border-radius: 20px;
    padding: 32px 28px 28px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(196, 133, 106, 0.08);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .icon {
    font-size: 28px;
    margin-bottom: 10px;
    display: block;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: #5C2D0E;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: #C4856A;
    font-weight: 300;
    letter-spacing: 0.04em;
    margin-bottom: 22px;
  }

  textarea {
    width: 100%;
    border: 0.5px solid #E8C9B5;
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: #5C2D0E;
    background: #FDF8F4;
    resize: none;
    height: 110px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.6;
  }

  textarea::placeholder { color: #D4B49A; }

  textarea:focus {
    border-color: #C4856A;
    box-shadow: 0 0 0 3px rgba(196, 133, 106, 0.1);
  }

  .char-count {
    text-align: right;
    font-size: 11px;
    color: #D4B49A;
    margin-top: 6px;
    margin-bottom: 18px;
    letter-spacing: 0.03em;
  }

  .buttons {
    display: flex;
    gap: 10px;
  }

  .btn-skip {
    flex: 1;
    padding: 12px;
    border: 0.5px solid #E8C9B5;
    border-radius: 50px;
    background: transparent;
    color: #C4856A;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .btn-skip:hover { background: #FDF0E8; }

  .btn-submit {
    flex: 2;
    padding: 12px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #C4856A, #D4AF8A);
    color: #fff;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { opacity: 0.5; cursor: default; }

  /* Thank you state */
  .thank-you {
    display: none;
    animation: fadeUp 0.4s ease both;
  }

  .thank-you .icon { font-size: 36px; margin-bottom: 14px; }

  .thank-you h2 { margin-bottom: 8px; }

  .thank-you p {
    font-size: 13px;
    color: #C4856A;
    font-weight: 300;
    line-height: 1.7;
  }

  .divider {
    width: 40px;
    height: 0.5px;
    background: #E8C9B5;
    margin: 18px auto;
  }
</style>
</head>
<body>

<div class="card">

  <!-- Form state -->
  <div id="form-state">
    <span class="icon">🌸</span>
    <h2>One last thing</h2>
    <p class="subtitle">Anything else you'd like to share?</p>

    <textarea
      id="feedback-text"
      maxlength="300"
      placeholder="Your thoughts, suggestions, or anything that stood out…"
      oninput="updateCount()"
    ></textarea>

    <p class="char-count"><span id="char-num">0</span> / 300</p>

    <div class="buttons">
      <button class="btn-skip" onclick="skip()">SKIP</button>
      <button class="btn-submit" id="submit-btn" onclick="submit()" disabled>SHARE ✦</button>
    </div>
  </div>

  <!-- Thank you state -->
  <div class="thank-you" id="thank-you-state">
    <span class="icon">💛</span>
    <h2>Thank you</h2>
    <div class="divider"></div>
    <p>Your feedback helps us create a better experience for you.</p>
  </div>

</div>

<script>
  function updateCount() {
    const ta = document.getElementById('feedback-text');
    const count = ta.value.length;
    document.getElementById('char-num').textContent = count;
    document.getElementById('submit-btn').disabled = count === 0;
  }

  function showThankYou() {
    document.getElementById('form-state').style.display = 'none';
    const ty = document.getElementById('thank-you-state');
    ty.style.display = 'block';
  }

  function skip() {
    showThankYou();
  }

  function submit() {
    const text = document.getElementById('feedback-text').value.trim();
    if (!text) return;

    // Optional: send to a Google Form or webhook here
    // fetch('YOUR_WEBHOOK_URL', { method: 'POST', body: JSON.stringify({ feedback: text }) });

    showThankYou();
  }
</script>

</body>
</html>
