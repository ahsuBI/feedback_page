<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luma</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #2A1F3D;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(232,180,200,0.04) 40px, rgba(232,180,200,0.04) 41px);
    pointer-events: none;
  }
  .card {
    position: relative;
    z-index: 1;
    background: #3D2E56;
    border: 0.5px solid rgba(232,180,200,0.25);
    border-radius: 24px;
    padding: 28px 24px 24px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .luma-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(232,180,200,0.12);
    color: #E8B4C8;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    padding: 4px 14px;
    border-radius: 20px;
    border: 0.5px solid rgba(232,180,200,0.2);
    margin-bottom: 16px;
  }
  .icon {
    font-size: 26px;
    margin-bottom: 8px;
    display: block;
    animation: sway 4s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }
  h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 23px;
    font-weight: 600;
    color: #FAF7F5;
    margin-bottom: 5px;
  }
  .subtitle {
    font-size: 13px;
    color: #C4A0C0;
    font-weight: 300;
    letter-spacing: 0.03em;
    margin-bottom: 20px;
  }
  textarea {
    width: 100%;
    border: 0.5px solid rgba(196,160,192,0.35);
    border-radius: 14px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: #FAF7F5;
    background: rgba(255,255,255,0.06);
    resize: none;
    height: 90px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.6;
  }
  textarea::placeholder { color: rgba(196,160,192,0.5); }
  textarea:focus {
    border-color: #E8B4C8;
    box-shadow: 0 0 0 3px rgba(232,180,200,0.1);
  }
  .char-count {
    text-align: right;
    font-size: 11px;
    color: rgba(196,160,192,0.6);
    margin-top: 5px;
    margin-bottom: 16px;
  }
  .buttons { display: flex; gap: 8px; }
  .btn-skip {
    flex: 1;
    padding: 11px;
    border: 0.5px solid rgba(196,160,192,0.35);
    border-radius: 50px;
    background: transparent;
    color: #C4A0C0;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-skip:hover { background: rgba(196,160,192,0.1); color: #FAF7F5; }
  .btn-submit {
    flex: 2;
    padding: 11px;
    border: none;
    border-radius: 50px;
    background: #E8B4C8;
    color: #2A1F3D;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:active { transform: scale(0.97); }
  .btn-submit:disabled { opacity: 0.3; cursor: default; }
  .divider { width: 32px; height: 0.5px; background: rgba(232,180,200,0.2); margin: 16px auto; }
  .spin-hint { font-size: 11px; color: rgba(196,160,192,0.55); letter-spacing: 0.03em; }
  #spin-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
    animation: fadeUp 0.4s ease both;
  }
  #spin-screen iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<div class="card" id="feedback-card">
  <div class="luma-badge">✦ LUMA</div>
  <span class="icon">🌸</span>
  <h2>One last thing</h2>
  <p class="subtitle">Anything else you'd like to share?</p>
  <textarea id="feedback-text" maxlength="300" placeholder="Your thoughts, suggestions, or anything that stood out…" oninput="updateCount()"></textarea>
  <p class="char-count"><span id="char-num">0</span> / 300</p>
  <div class="buttons">
    <button class="btn-skip" onclick="goSpin()">SKIP</button>
    <button class="btn-submit" id="submit-btn" onclick="goSpin()" disabled>SHARE & SPIN 🎡</button>
  </div>
  <div class="divider"></div>
  <p class="spin-hint">🎁 A surprise reward is waiting for you!</p>
</div>

<div id="spin-screen">
  <iframe id="spin-iframe" src="" allow="autoplay"></iframe>
</div>

<script>
  function updateCount() {
    const n = document.getElementById('feedback-text').value.length;
    document.getElementById('char-num').textContent = n;
    document.getElementById('submit-btn').disabled = n === 0;
  }
  function goSpin() {
    document.getElementById('feedback-card').style.display = 'none';
    document.getElementById('spin-iframe').src = 'https://ahsubi.github.io/Spin-wheel/';
    document.getElementById('spin-screen').style.display = 'block';
  }
</script>
</body>
</html>
